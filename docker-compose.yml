services:
  parsing-service:
    build: .
    ports:
      - "8010:8000"
    env_file:
      - .env
    environment:
      - TZ=Europe/Moscow
    volumes:
      - ./app/debug:/app/app/debug
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  worker:
    build: .
    command: ["python", "-m", "app.worker.run_worker"]
    env_file:
      - .env
    environment:
      - TZ=Europe/Moscow
    volumes:
      - ./app/debug:/app/app/debug
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped